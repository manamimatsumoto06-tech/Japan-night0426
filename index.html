<title>Japan Night Dress-Up</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:#fafafa;min-height:100vh;}
.header{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);padding:14px 20px 10px;text-align:center;color:white;text-shadow:0 1px 2px rgba(0,0,0,0.15);}
.header h1{font-size:18px;letter-spacing:1px;font-weight:600;}
.header p{font-size:10px;opacity:0.9;margin-top:2px;}
.char-select{display:none;}
.char-btn{text-align:center;cursor:pointer;transition:all 0.15s;}
.char-btn .avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);padding:2px;overflow:hidden;margin:0 auto;}
.char-btn .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;border:2px solid #fff;}
.char-btn.active .avatar{box-shadow:0 0 0 3px rgba(220,39,67,0.3);}
.char-btn .char-name{font-size:10px;color:#8e8e8e;margin-top:3px;}
.char-btn.active .char-name{color:#262626;font-weight:600;}
.stage{position:relative;width:100%;max-width:400px;margin:6px auto;aspect-ratio:1;background:#fff;border-radius:3px;border:1px solid #dbdbdb;overflow:hidden;}
.stage canvas{width:100%;height:100%;display:block;}
.tabs{display:flex;justify-content:center;gap:4px;padding:0 8px;margin-bottom:6px;}
.tab-btn{flex:1;max-width:100px;padding:7px 2px;border:1px solid #dbdbdb;border-radius:20px;background:#fff;font-size:12px;font-weight:600;color:#8e8e8e;cursor:pointer;}
.tab-btn.active{background:linear-gradient(45deg,#f09433,#dc2743);border-color:transparent;color:#fff;}
.item-grid{display:none;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 12px 10px;max-width:420px;margin:0 auto;}
.item-grid.active{display:grid;}
.item-card{aspect-ratio:1;border-radius:8px;border:1px solid #dbdbdb;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px;transition:all 0.15s;}
.item-card:active{transform:scale(0.94);}
.item-card.selected{border-color:#dc2743;box-shadow:0 0 0 2px rgba(220,39,67,0.2);}
.item-card .icon{font-size:24px;width:64px;height:64px;display:flex;align-items:center;justify-content:center;overflow:hidden;}.item-card .icon img{width:100%;height:100%;object-fit:contain;}
.item-card .name{font-size:8px;color:#8e8e8e;margin-top:1px;}
.item-card.none-card{background:#fafafa;}
.item-card.disabled{opacity:0.35;}
.actions{display:flex;gap:8px;justify-content:center;padding:6px 12px 18px;}
.action-btn{padding:9px 16px;border-radius:22px;border:none;font-size:13px;font-weight:600;cursor:pointer;}
.action-btn:active{transform:scale(0.95);}
.btn-save{background:linear-gradient(45deg,#3897f0,#5b51d8);color:white;}
.btn-random{background:#fff;color:#262626;border:1px solid #dbdbdb;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(38,38,38,0.9);color:white;padding:10px 24px;border-radius:20px;font-size:13px;transition:transform 0.3s;z-index:100;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

.select-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:20px;}
.select-title{font-size:16px;color:#262626;margin-bottom:20px;letter-spacing:0.5px;font-weight:600;}
.name-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:360px;padding:0 16px;}
.name-btn{padding:16px 12px;border-radius:12px;border:1px solid #dbdbdb;background:#fff;font-size:15px;font-weight:600;color:#262626;cursor:pointer;transition:all 0.15s;text-align:center;}
.name-btn:active{transform:scale(0.95);background:#fafafa;border-color:#dc2743;}
.name-btn .kanji{font-size:11px;color:#8e8e8e;margin-top:2px;font-weight:400;}
.dressup-screen{display:none;}
.dressup-screen.active{display:block;}
.back-btn{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:20px;color:rgba(255,255,255,0.9);cursor:pointer;}
.header{position:relative;}

.edit-panel{display:none;background:#fff;border-top:1px solid #dbdbdb;padding:10px 16px;max-width:420px;margin:0 auto;}
.edit-panel.active{display:block;}
.edit-panel label{font-size:12px;color:#262626;display:block;margin-top:6px;}
.edit-panel input[type=range]{width:100%;margin:2px 0;}
.edit-panel .val{font-size:11px;color:#8e8e8e;float:right;}
.edit-btn{padding:6px 14px;border-radius:16px;border:1px solid #dbdbdb;background:#fff;font-size:12px;font-weight:600;color:#262626;cursor:pointer;margin-right:6px;}
.edit-btn.active{background:#262626;color:#fff;}
.export-btn{padding:6px 14px;border-radius:16px;border:1px solid #dbdbdb;background:#fff;font-size:12px;font-weight:600;color:#262626;cursor:pointer;}
</style>
</head>

<div class="header"><button class="back-btn" id="backBtn" style="display:none;" onclick="showSelectScreen()">←</button><h1>🌸 Japan Night Dress-Up</h1><p>Style your character with Japanese outfits!</p></div>

<div class="select-screen" id="selectScreen">
<div class="select-title">Choose your character</div>
<div class="name-grid" id="nameGrid"></div>
</div>
<div class="dressup-screen" id="dressupScreen"><div class="char-select" id="charSelect"></div>
<div class="stage"><canvas id="cv" width="1024" height="1024"></canvas></div>
<div id="editBtnWrap" style="display:none;text-align:center;padding:6px;"><button class="edit-btn" id="editToggle" onclick="toggleEdit()" style="font-size:14px;padding:8px 20px;">✏️ Edit Face Position</button></div>
<div class="tabs">
<button class="tab-btn active" data-cat="outfit">👘 Outfit</button>
<button class="tab-btn" data-cat="item">🪭 Items</button>
<button class="tab-btn" data-cat="buddy">🐾 Buddy</button>
</div>
<div class="item-grid active" id="grid-outfit"></div>
<div class="item-grid" id="grid-item"></div>
<div class="item-grid" id="grid-buddy"></div>
<div class="actions">
<button class="action-btn btn-random" onclick="randomize()">🎲 Random</button>
<button class="action-btn btn-save" onclick="saveImage()">📷 Save</button>
<button class="action-btn btn-save" onclick="joinPlaza()" style="background:linear-gradient(45deg,#f09433,#e6683c,#dc2743);">🏯 Plaza!</button>
</div>

<div class="edit-panel" id="editPanel">
<label>↕️ 上下 (Y) <span class="val" id="valY">0</span></label>
<input type="range" id="sliderY" min="-200" max="200" value="0" oninput="updateFacePos()">
<label>↔️ 左右 (X) <span class="val" id="valX">0</span></label>
<input type="range" id="sliderX" min="-200" max="200" value="0" oninput="updateFacePos()">

<div style="margin-top:8px;display:flex;gap:6px;">
<button class="edit-btn" onclick="saveFacePos()">💾 この顔を保存</button>
<button class="export-btn" onclick="exportAllPos()">📋 全設定をコピー</button>
</div>
</div>
</div><div class="toast" id="toast"></div>

function buildCharSelect(){const c=document.getElementById('charSelect');c.innerHTML='';CHARACTERS.forEach(ch=>{const btn=document.createElement('div');btn.className='char-btn'+(currentChar.id===ch.id?' active':'');btn.innerHTML='<div class="avatar"><img src="'+IMAGE_DATA[ch.face]+'"></div><div class="char-name">'+ch.name+'</div>';btn.onclick=()=>{currentChar=ch;buildCharSelect();render();};c.appendChild(btn);});}
function buildGrid(items,gid,cat){const g=document.getElementById(gid);g.innerHTML='';items.forEach(item=>{const c=document.createElement('div');const has=item.img&&images[item.img];c.className='item-card'+(item.id==='none'?' none-card':'')+(sel[cat]===item.id?' selected':'')+(!has&&item.id!=='none'?' disabled':'');let iconHtml;if(has&&images[item.img]){const imgSrc=images[item.img].src;if(cat==='buddy'){iconHtml='<div class="icon" style="position:relative;"><img src="'+imgSrc+'" alt="'+item.name+'" style="position:absolute;width:210%;height:210%;right:-10%;bottom:-5%;object-fit:contain;"></div>';}else{iconHtml='<div class="icon"><img src="'+imgSrc+'" alt="'+item.name+'"></div>';}}else{iconHtml='<div class="icon">'+item.emoji+'</div>';}c.innerHTML=iconHtml+'<div class="name">'+item.name+'</div>';c.onclick=()=>{if(!has&&item.id!=='none')return;sel[cat]=item.id;buildGrid(items,gid,cat);render();};g.appendChild(c);});}

let firebaseReady = false;
function initFirebase() {
  if (firebaseReady) return Promise.resolve();
  return new Promise((resolve) => {
    const s1 = document.createElement('script');
    s1.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js';
    s1.onload = () => {
      const s2 = document.createElement('script');
      s2.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js';
      s2.onload = () => {
        firebase.initializeApp(FIREBASE_CONFIG);
        firebaseReady = true;
        resolve();
      };
      document.head.appendChild(s2);
    };
    document.head.appendChild(s1);
  });
}

async function joinPlaza() {
  if (sel.outfit === 'none' && sel.item === 'none' && sel.buddy === 'none') {
    showToast('Choose an outfit first!');
    return;
  }
  showToast('Joining Plaza...');
  try {
    await initFirebase();
    const db = firebase.database();
    const safeId = currentChar.id.replace(/[.#$/\[\]]/g, '_');
    await db.ref('plaza/' + safeId).set({
      id: currentChar.id,
      name: currentChar.name,
      nameEn: currentChar.nameEn,
      face: currentChar.face,
      outfit: sel.outfit,
      item: sel.item,
      buddy: sel.buddy,
      ts: Date.now()
    });
    window.location.href = 'plaza.html?char=' + encodeURIComponent(currentChar.id);
  } catch (e) {
    console.error(e);
    showToast('Connection error...');
  }
}
