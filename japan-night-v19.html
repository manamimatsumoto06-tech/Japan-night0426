<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Japan Night Dress-Up</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Helvetica Neue',Arial,sans-serif;background:#fef6f0;min-height:100vh}
.header{background:linear-gradient(135deg,#e8a0bf 0%,#c9b1d0 50%,#a3c4dc 100%);padding:14px 20px 10px;text-align:center;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.15)}.header h1{font-size:18px;letter-spacing:2px}.header p{font-size:10px;opacity:.9;margin-top:2px}
.stage{position:relative;width:100%;max-width:400px;margin:10px auto;aspect-ratio:1;background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.06);overflow:hidden}.stage canvas{width:100%;height:100%;display:block}
.tabs{display:flex;justify-content:center;gap:4px;padding:0 8px;margin-bottom:6px}.tab-btn{flex:1;max-width:100px;padding:7px 2px;border:2px solid #e0d4cc;border-radius:18px;background:#fff;font-size:12px;font-weight:600;color:#8b7b6b;cursor:pointer}.tab-btn.active{background:#e8a0bf;border-color:#e8a0bf;color:#fff}
.item-grid{display:none;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 12px 10px;max-width:420px;margin:0 auto}.item-grid.active{display:grid}
.item-card{aspect-ratio:1;border-radius:10px;border:2px solid #e8ddd5;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px;transition:all .15s}.item-card:active{transform:scale(.94)}.item-card.selected{border-color:#e8a0bf;box-shadow:0 0 0 2px rgba(232,160,191,.3)}.item-card .icon{font-size:24px}.item-card .name{font-size:8px;color:#8b7b6b;margin-top:1px}.item-card.none-card{background:#f5f0eb}
.actions{display:flex;gap:8px;justify-content:center;padding:6px 12px 18px}.action-btn{padding:9px 16px;border-radius:22px;border:none;font-size:13px;font-weight:600;cursor:pointer}.action-btn:active{transform:scale(.95)}.btn-save{background:linear-gradient(135deg,#e8a0bf,#c9b1d0);color:#fff}.btn-random{background:#fff;color:#8b7b6b;border:2px solid #e0d4cc}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(0,0,0,.75);color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;transition:transform .3s;z-index:100;pointer-events:none}.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="header"><h1>🌸 Japan Night Dress-Up</h1><p>Style your character with Japanese outfits!</p></div>
<div class="stage"><canvas id="cv" width="1024" height="1024"></canvas></div>
<div class="tabs"><button class="tab-btn active" data-cat="outfit">👘 Outfit</button><button class="tab-btn" data-cat="accessory">🎒 Items</button><button class="tab-btn" data-cat="companion">🐾 Buddy</button></div>
<div class="item-grid active" id="grid-outfit"></div><div class="item-grid" id="grid-accessory"></div><div class="item-grid" id="grid-companion"></div>
<div class="actions"><button class="action-btn btn-random" onclick="randomize()">🎲 Random</button><button class="action-btn btn-save" onclick="saveImage()">📷 Save</button></div>
<div class="toast" id="toast"></div>

const images={};let lc=0;const total=Object.keys(imageSources).length;
function loadImages(cb){for(const[k,s]of Object.entries(imageSources)){const img=new Image();img.onload=()=>{images[k]=img;if(++lc>=total)cb()};img.onerror=()=>{if(++lc>=total)cb()};img.src=s}}
const OUTFITS=[{id:'none',name:'None',emoji:'✖️'},{id:'kimono',name:'Kimono',emoji:'👘',img:'kimono'}];
const ACCESSORIES=[{id:'none',name:'None',emoji:'✖️'},{id:'fan',name:'Fan',emoji:'🪭'},{id:'umbrella',name:'Umbrella',emoji:'🌂'},{id:'katana',name:'Katana',emoji:'🗡️'},{id:'lantern',name:'Lantern',emoji:'🏮'},{id:'onigiri',name:'Onigiri',emoji:'🍙'},{id:'dango',name:'Dango',emoji:'🍡'}];
const COMPANIONS=[{id:'none',name:'None',emoji:'✖️'},{id:'shiba',name:'Shiba',emoji:'🐕'},{id:'neko',name:'Cat',emoji:'🐱'},{id:'kitsune',name:'Fox',emoji:'🦊'},{id:'usagi',name:'Bunny',emoji:'🐰'},{id:'panda',name:'Panda',emoji:'🐼'},{id:'dragon',name:'Dragon',emoji:'🐉'}];
let sel={outfit:'none',accessory:'none',companion:'none'};
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function render(){const W=1024,H=1024;ctx.clearRect(0,0,W,H);ctx.fillStyle='#fef6f0';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#f0e6da';ctx.beginPath();ctx.ellipse(W/2,H*.92,W*.22,H*.012,0,0,Math.PI*2);ctx.fill();
const o=OUTFITS.find(o=>o.id===sel.outfit);const oi=o?.img?images[o.img]:null;
if(images.face)ctx.drawImage(images.face,0,0,W,H);
if(oi)ctx.drawImage(oi,0,0,W,H);
if(sel.companion!=='none'){const c=COMPANIONS.find(c=>c.id===sel.companion);if(c){ctx.font='80px sans-serif';ctx.textAlign='center';ctx.fillText(c.emoji,W*.8,H*.87)}}
if(sel.accessory!=='none'){const a=ACCESSORIES.find(a=>a.id===sel.accessory);if(a){ctx.font='60px sans-serif';ctx.textAlign='center';ctx.fillText(a.emoji,W*.77,H*.62)}}
ctx.fillStyle='rgba(232,160,191,0.8)';ctx.beginPath();ctx.roundRect?.(W/2-60,H-48,120,32,12)||ctx.rect(W/2-60,H-48,120,32);ctx.fill();
ctx.fillStyle='#fff';ctx.font='bold 16px sans-serif';ctx.textAlign='center';ctx.fillText('Manami',W/2,H-26)}
function buildGrid(items,gid,cat){const g=document.getElementById(gid);g.innerHTML='';items.forEach(i=>{const c=document.createElement('div');c.className='item-card'+(i.id==='none'?' none-card':'')+(sel[cat]===i.id?' selected':'');c.innerHTML=`<div class="icon">${i.emoji}</div><div class="name">${i.name}</div>`;c.onclick=()=>{sel[cat]=i.id;buildGrid(items,gid,cat);render()};g.appendChild(c)})}
document.querySelectorAll('.tab-btn').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.item-grid').forEach(x=>x.classList.remove('active'));document.getElementById('grid-'+b.dataset.cat).classList.add('active')}});
function randomize(){const o=OUTFITS.filter(x=>x.id!=='none');sel.outfit=o[Math.floor(Math.random()*o.length)].id;sel.accessory=ACCESSORIES[Math.floor(Math.random()*ACCESSORIES.length)].id;sel.companion=COMPANIONS[Math.floor(Math.random()*COMPANIONS.length)].id;buildGrid(OUTFITS,'grid-outfit','outfit');buildGrid(ACCESSORIES,'grid-accessory','accessory');buildGrid(COMPANIONS,'grid-companion','companion');render()}
function saveImage(){const l=document.createElement('a');l.download='japan-night-avatar.png';l.href=cv.toDataURL('image/png');l.click();showToast('📷 Saved!')}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
buildGrid(OUTFITS,'grid-outfit','outfit');buildGrid(ACCESSORIES,'grid-accessory','accessory');buildGrid(COMPANIONS,'grid-companion','companion');loadImages(()=>{render()});
</script>
